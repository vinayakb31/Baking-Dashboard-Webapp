{% extends "bakelet/base.html" %}

{% block title %}Contact Us | Bakelet{% endblock %}

{% block content %}
<section class="section-padding" style="margin-top: var(--spacing-lg);">
    <div class="container">
        <h1 class="text-center" style="margin-bottom: var(--spacing-lg);">Get in Touch</h1>

        <div style="display: flex; gap: var(--spacing-lg); flex-wrap: wrap; justify-content: center;">

            <!-- Contact Info -->
            <div
                style="flex: 1; min-width: 300px; max-width: 500px; background: var(--color-white); padding: var(--spacing-md); border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.05);">
                <h3 style="margin-bottom: var(--spacing-sm);">Visit Us</h3>
                <p style="margin-bottom: var(--spacing-sm);">123 Baker Street<br>Sweet Town, ST 12345</p>

                <h3 style="margin-bottom: var(--spacing-sm);">Hours</h3>
                <ul style="margin-bottom: var(--spacing-sm);">
                    <li>Mon - Fri: 7am - 7pm</li>
                    <li>Sat - Sun: 8am - 5pm</li>
                </ul>

                <h3 style="margin-bottom: var(--spacing-sm);">Contact</h3>
                <p>hello@bakelet.com<br>(555) 123-4567</p>
            </div>

            <!-- Contact Form -->
            <div style="flex: 1; min-width: 300px; max-width: 500px;">
                <form style="display: flex; flex-direction: column; gap: var(--spacing-sm);">
                    <div>
                        <label for="name" style="display: block; margin-bottom: 5px; font-weight: 700;">Name</label>
                        <input type="text" id="name"
                            style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-family: inherit;">
                    </div>
                    <div>
                        <label for="email" style="display: block; margin-bottom: 5px; font-weight: 700;">Email</label>
                        <input type="email" id="email"
                            style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-family: inherit;">
                    </div>
                    <div>
                        <label for="message"
                            style="display: block; margin-bottom: 5px; font-weight: 700;">Message</label>
                        <textarea id="message" rows="5"
                            style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-family: inherit;"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" style="align-self: flex-start; border: none;">Send
                        Message</button>
                </form>
            </div>

        </div>
    </div>
</section>
{% endblock %}
